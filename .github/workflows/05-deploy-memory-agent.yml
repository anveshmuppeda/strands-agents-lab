name: Deploy Memory Gateway Agent (CDK)

on:
  workflow_dispatch: # Manual trigger only

env:
  AWS_REGION: us-east-1
  CDK_DIR: agents/05-memory-agent/cdk
  AGENT_CODE_DIR: agents/05-memory-agent/agent-code

permissions:
  id-token: write   # For OIDC auth with AWS
  contents: read

jobs:

  # ──────────────────────────────────────────────
  # Job 1: Deploy Gateway + Lambdas + Memory + Runtime
  # ──────────────────────────────────────────────
  deploy-infra:
    name: Deploy Base Infra (Tools & Gateway)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: ${{ env.CDK_DIR }}
        run: pip install -r requirements.txt

      - name: CDK Deploy — Base Infra
        working-directory: ${{ env.CDK_DIR }}
        run: cdk deploy ToolsGateway --require-approval never

  # ──────────────────────────────────────────────
  # Job 2: Build Docker image and push to ECR
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Agent Image
    runs-on: ubuntu-latest
    needs: deploy-infra
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          # Use short git SHA as image tag
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ARM64 image
        working-directory: ${{ env.AGENT_CODE_DIR }}
        env:
            ECR_URI: "463470985368.dkr.ecr.us-east-1.amazonaws.com/gateway-agent"
            IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
            docker buildx build \
            --platform linux/arm64 \
            -t $ECR_URI:$IMAGE_TAG \
            -t $ECR_URI:latest \
            --push .

  # ──────────────────────────────────────────────
  # Job 3: Deploy AgentCore Runtime with new image
  # ──────────────────────────────────────────────
  deploy-agentcore:
    name: Deploy AgentCore
    runs-on: ubuntu-latest
    needs: [deploy-infra, build-and-push]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: ${{ env.CDK_DIR }}
        run: pip install -r requirements.txt

      - name: CDK Deploy — MemoryGatewayAgent AgentCore Runtime
        working-directory: ${{ env.CDK_DIR }}
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          cdk deploy MemoryGatewayAgent-Runtime \
            --require-approval never \
            -c image_tag=$IMAGE_TAG