name: Network Agent Delivery Pipeline

on:
workflow_dispatch:

env:
AWS_REGION: us-east-1
CDK_PATH: agents/03-network-agent-cdk
STACK_BASE: NetworkAgent-BaseInfra
STACK_RUNTIME: NetworkAgent-AgentCore

permissions:
id-token: write
contents: read

# ============================================================

# 🔹 JOB 1 — INFRASTRUCTURE PROVISIONING

# ============================================================

jobs:
infra:
name: Provision Infrastructure
runs-on: ubuntu-latest

```
outputs:
  ecr_uri: ${{ steps.export.outputs.ecr_uri }}

steps:
  - name: Source Checkout
    uses: actions/checkout@v4

  - name: Runtime Setup
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - uses: actions/setup-python@v5
    with:
      python-version: 3.11
      cache: pip

  - name: Install CDK CLI
    run: npm install -g aws-cdk

  - name: Authenticate to AWS (OIDC)
    uses: aws-actions/configure-aws-credentials@v4
    with:
      role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Install Dependencies
    working-directory: ${{ env.CDK_PATH }}
    run: pip install -r requirements.txt

  - name: Deploy Base Stack
    working-directory: ${{ env.CDK_PATH }}
    run: |
      cdk deploy $STACK_BASE \
        --require-approval never

  - name: Extract Stack Outputs
    id: export
    run: |
      ECR_URI=$(aws cloudformation describe-stacks \
        --stack-name $STACK_BASE \
        --query 'Stacks[0].Outputs[?OutputKey==`ECRRepositoryUri`].OutputValue' \
        --output text)

      echo "ecr_uri=$ECR_URI" >> $GITHUB_OUTPUT
```

# ============================================================

# 🔹 JOB 2 — IMAGE BUILD & REGISTRY PUSH

# ============================================================

build:
name: Build & Publish Image
runs-on: ubuntu-latest
needs: infra

```
outputs:
  image_tag: ${{ steps.meta.outputs.tag }}

steps:
  - uses: actions/checkout@v4

  - name: AWS Authentication
    uses: aws-actions/configure-aws-credentials@v4
    with:
      role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      aws-region: ${{ env.AWS_REGION }}

  - name: ECR Login
    uses: aws-actions/amazon-ecr-login@v2

  - name: Generate Image Metadata
    id: meta
    run: |
      TAG=$(git rev-parse --short HEAD)
      echo "tag=$TAG" >> $GITHUB_OUTPUT

  - name: Setup Buildx
    uses: docker/setup-buildx-action@v3

  - name: Build & Push (Multi-Arch)
    working-directory: ${{ env.CDK_PATH }}/agent-code
    env:
      ECR_URI: ${{ needs.infra.outputs.ecr_uri }}
      IMAGE_TAG: ${{ steps.meta.outputs.tag }}
    run: |
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --tag $ECR_URI:$IMAGE_TAG \
        --tag $ECR_URI:latest \
        --push .
```

# ============================================================

# 🔹 JOB 3 — APPLICATION DEPLOYMENT

# ============================================================

deploy:
name: Deploy Runtime
runs-on: ubuntu-latest
needs: [infra, build]

```
steps:
  - uses: actions/checkout@v4

  - name: Runtime Setup
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - uses: actions/setup-python@v5
    with:
      python-version: 3.11
      cache: pip

  - name: Install CDK CLI
    run: npm install -g aws-cdk

  - name: AWS Authentication
    uses: aws-actions/configure-aws-credentials@v4
    with:
      role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Install Dependencies
    working-directory: ${{ env.CDK_PATH }}
    run: pip install -r requirements.txt

  - name: Deploy Runtime Stack
    working-directory: ${{ env.CDK_PATH }}
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
    run: |
      cdk deploy $STACK_RUNTIME \
        --require-approval never \
        -c image_tag=$IMAGE_TAG
```
